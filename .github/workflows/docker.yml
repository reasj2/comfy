name: Inspect Base Image

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Pull base image
        run: docker pull apmonej/tttwan:v0.14.2-cuda-12.9-py312

      - name: Find ComfyUI
        run: |
          docker run --rm --entrypoint sh apmonej/tttwan:v0.14.2-cuda-12.9-py312 -c "pwd"
          docker run --rm --entrypoint sh apmonej/tttwan:v0.14.2-cuda-12.9-py312 -c "ls -la /"
          docker run --rm --entrypoint sh apmonej/tttwan:v0.14.2-cuda-12.9-py312 -c "ls -la /workspace || true"
          docker run --rm --entrypoint sh apmonej/tttwan:v0.14.2-cuda-12.9-py312 -c "ls -la /workspace/ComfyUI || true"
          docker run --rm --entrypoint sh apmonej/tttwan:v0.14.2-cuda-12.9-py312 -c "ls -la /ComfyUI || true"
          docker run --rm --entrypoint sh apmonej/tttwan:v0.14.2-cuda-12.9-py312 -c "ls -la /app || true"
          docker run --rm --entrypoint sh apmonej/tttwan:v0.14.2-cuda-12.9-py312 -c "ls -la /opt || true"
