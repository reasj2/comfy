name: Inspect Base Image

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Pull base image
        run: docker pull apmonej/tttwan:v0.14.2-cuda-12.9-py312

      - name: Find ComfyUI
        run: |
          docker run --rm apmonej/tttwan:v0.14.2-cuda-12.9-py312 sh -lc '
            echo "=== pwd ==="
            pwd
            echo "=== /workspace ==="
            ls -la /workspace || true
            echo "=== find main.py ==="
            find / -name main.py 2>/dev/null | grep -i comfy || true
            echo "=== find comfy folders ==="
            find / -maxdepth 4 -type d 2>/dev/null | grep -i comfy || true
          '
