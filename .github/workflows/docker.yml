name: Copy Docker Image

on:
  workflow_dispatch:

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Pull image
        run: docker pull vastai/comfy:v0.14.2-cuda-12.9-py312

      - name: Tag image
        run: docker tag vastai/comfy:v0.14.2-cuda-12.9-py312 apmonej/TTTWAN:v0.14.2-cuda-12.9-py312

      - name: Push image
        run: docker push apmonej/TTTWAN:v0.14.2-cuda-12.9-py312
