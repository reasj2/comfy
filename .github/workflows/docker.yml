name: Inspect Base Image

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Pull base image
        run: docker pull apmonej/tttwan:v0.14.2-cuda-12.9-py312

      - name: Find ComfyUI
        run: |
          docker run --rm --entrypoint sh apmonej/tttwan:v0.14.2-cuda-12.9-py312 -lc '
            echo "=== pwd ==="
            pwd
            echo "=== /workspace ==="
            ls -la /workspace || true
            echo "=== likely comfy dirs ==="
            ls -la /workspace/ComfyUI || true
            ls -la /ComfyUI || true
            ls -la /app/ComfyUI || true
            ls -la /opt/ComfyUI || true
            ls -la /root/ComfyUI || true
            ls -la /usr/src/app || true
            echo "=== likely main.py ==="
            ls -la /workspace/ComfyUI/main.py || true
            ls -la /ComfyUI/main.py || true
            ls -la /app/ComfyUI/main.py || true
            ls -la /opt/ComfyUI/main.py || true
            ls -la /root/ComfyUI/main.py || true
            ls -la /usr/src/app/main.py || true
          '
